<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seif & Malak — Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --dark-maroon: #721A1A;
            --muted-rose: #A66F68;
            --medium-maroon: #7F312F;
            --deep-red: #731818;
            --cream: #F9FDED;
            --gold: #C9A96E;
            --envelope-dark: #5c1212;
        }
        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--cream);
            color: var(--dark-maroon);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== ENVELOPE OPENING SCREEN ===== */
        .envelope-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: linear-gradient(135deg, var(--dark-maroon) 0%, var(--deep-red) 40%, var(--medium-maroon) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1.5s ease;
            overflow: hidden;
        }
        .envelope-screen.hidden { opacity: 0; pointer-events: none; }

        .floral-deco {
            position: absolute;
            opacity: 0.12;
            pointer-events: none;
        }
        .floral-deco svg { width: 100%; height: 100%; }
        .floral-deco.tl { top: 20px; left: 20px; width: 150px; height: 150px; }
        .floral-deco.tr { top: 20px; right: 20px; width: 150px; height: 150px; transform: scaleX(-1); }
        .floral-deco.bl { bottom: 20px; left: 20px; width: 120px; height: 120px; transform: scaleY(-1); }
        .floral-deco.br { bottom: 20px; right: 20px; width: 120px; height: 120px; transform: scale(-1); }

        .envelope-container {
            position: relative;
            width: 340px; height: 240px;
            cursor: pointer;
            perspective: 1000px;
            z-index: 10;
        }
        .envelope-body {
            position: absolute;
            bottom: 0;
            width: 100%; height: 180px;
            background: linear-gradient(180deg, var(--envelope-dark) 0%, var(--dark-maroon) 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .envelope-body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, transparent 30%);
        }
        .envelope-flap-left {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid var(--envelope-dark);
            border-top: 90px solid transparent;
            border-bottom: 90px solid transparent;
            z-index: 2; opacity: 0.9;
        }
        .envelope-flap-right {
            position: absolute;
            bottom: 0; right: 0;
            width: 0; height: 0;
            border-right: 170px solid var(--envelope-dark);
            border-top: 90px solid transparent;
            border-bottom: 90px solid transparent;
            z-index: 2; opacity: 0.9;
        }
        .envelope-flap-bottom {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-bottom: 120px solid var(--dark-maroon);
            z-index: 3;
        }
        .envelope-flap-top {
            position: absolute;
            top: 60px; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 120px solid var(--medium-maroon);
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .envelope-flap-top::before {
            content: '';
            position: absolute;
            top: -120px; left: -170px;
            width: 340px; height: 120px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
            clip-path: polygon(50% 100%, 0 0, 100% 0);
        }
        .wax-seal {
            position: absolute;
            top: 45px; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--gold) 0%, #b8945f 100%);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.3);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .wax-seal::before {
            content: '';
            position: absolute;
            width: 38px; height: 38px;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
        }
        .envelope-container:hover .wax-seal {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 5px 20px rgba(201, 169, 110, 0.4);
        }
        .envelope-container.opened .envelope-flap-top {
            transform: rotateX(180deg);
            z-index: 1;
        }
        .envelope-container.opened .wax-seal {
            top: 15px;
            transform: translateX(-50%) scale(0.8);
            opacity: 0.6;
        }
        .envelope-card {
            position: absolute;
            top: 60px; left: 50%;
            transform: translateX(-50%);
            width: 300px; height: 420px;
            background: var(--cream);
            z-index: 4;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            overflow: hidden;
            opacity: 0;
        }
        .envelope-container.opened .envelope-card {
            top: -200px;
            opacity: 1;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .card-inner-border {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1.5px solid var(--dark-maroon);
            pointer-events: none;
        }
        .card-inner-border::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--muted-rose);
            opacity: 0.5;
        }
        .card-preview-content {
            padding: 30px 20px;
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card-preview-names {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.2rem;
            color: var(--dark-maroon);
            line-height: 1.2;
        }
        .card-preview-ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            color: var(--muted-rose);
            margin: 5px 0;
        }
        .card-preview-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted-rose);
            margin-top: 15px;
        }
        .click-hint {
            position: absolute;
            bottom: -50px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted-rose);
            white-space: nowrap;
            animation: pulseHint 2s ease-in-out infinite;
        }
        @keyframes pulseHint {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
            50% { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        }
        .envelope-container.opened + .click-hint { display: none; }

        .transition-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: var(--cream);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        .transition-overlay.active { opacity: 1; }

        /* ===== MAIN INVITATION ===== */
        .main-invitation {
            min-height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px 15px;
            position: relative;
            opacity: 0;
            transition: opacity 1.5s ease;
            background: linear-gradient(180deg, var(--dark-maroon) 0%, var(--deep-red) 30%, var(--medium-maroon) 60%, var(--muted-rose) 100%);
        }
        .main-invitation.visible { display: flex; opacity: 1; }

        .invitation-card {
            max-width: 480px;
            width: 100%;
            background: var(--cream);
            position: relative;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            padding: 50px 35px;
            overflow: hidden;
        }
        .lace-border {
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 2px solid var(--dark-maroon);
            pointer-events: none;
            z-index: 1;
        }
        .lace-border::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--muted-rose);
        }
        .card-floral {
            position: absolute;
            width: 100px; height: 100px;
            opacity: 0.12;
            z-index: 0;
        }
        .card-floral.top-left { top: 15px; left: 15px; }
        .card-floral.top-right { top: 15px; right: 15px; transform: rotate(90deg); }
        .card-floral.bottom-left { bottom: 15px; left: 15px; transform: rotate(-90deg); }
        .card-floral.bottom-right { bottom: 15px; right: 15px; transform: rotate(180deg); }
        .card-content { position: relative; z-index: 2; }

        .youre-invited {
            font-family: 'Pinyon Script', cursive;
            font-size: 3rem;
            color: var(--dark-maroon);
            margin-bottom: 5px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.3s;
        }
        .celebrate-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--muted-rose);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.5s;
        }
        .ring-box-svg {
            width: 240px;
            height: 170px;
            margin: 20px auto;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.7s;
        }
        .names-section {
            margin: 25px 0;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 0.9s;
        }
        .name-script {
            font-family: 'Pinyon Script', cursive;
            font-size: 3.8rem;
            color: var(--dark-maroon);
            line-height: 1.1;
            display: block;
        }
        .name-ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--muted-rose);
            display: block;
            margin: 5px 0;
        }
        .ornament-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 25px 0;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1.1s;
        }
        .ornament-line { width: 60px; height: 1px; background: var(--muted-rose); }
        .ornament-symbol {
            font-size: 1.2rem;
            color: var(--muted-rose);
            margin: 0 15px;
            opacity: 0.7;
        }
        .details-section {
            margin-top: 30px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards;
            animation-delay: 1.3s;
        }
        .detail-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--dark-maroon);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .detail-time {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--medium-maroon);
            font-weight: 500;
            margin-bottom: 15px;
        }
        .detail-venue {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95rem;
            color: var(--medium-maroon);
            line-height: 1.5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .bottom-ring {
            width: 180px;
            margin: 20px auto 0;
            opacity: 0.15;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.12; }
            50% { opacity: 0.2; }
        }
        .floral-deco { animation: gentlePulse 4s ease-in-out infinite; }

        @media (max-width: 500px) {
            .envelope-container { width: 300px; height: 210px; }
            .envelope-flap-left {
                border-left: 150px solid var(--envelope-dark);
                border-top: 80px solid transparent;
                border-bottom: 80px solid transparent;
            }
            .envelope-flap-right {
                border-right: 150px solid var(--envelope-dark);
                border-top: 80px solid transparent;
                border-bottom: 80px solid transparent;
            }
            .envelope-flap-bottom {
                border-left: 150px solid transparent;
                border-right: 150px solid transparent;
                border-bottom: 100px solid var(--dark-maroon);
            }
            .envelope-flap-top {
                border-left: 150px solid transparent;
                border-right: 150px solid transparent;
                border-top: 100px solid var(--medium-maroon);
            }
            .envelope-card { width: 260px; height: 360px; }
            .name-script { font-size: 2.8rem; }
            .youre-invited { font-size: 2.4rem; }
            .invitation-card { padding: 40px 25px; }
            .ring-box-svg { width: 200px; height: 140px; }
        }
    </style>
</head>
<body>

                <path d="M30 10 Q35 5 40 10" stroke="#F9FDED" stroke-width="0.5" fill="none"/>
                <path d="M10 30 Q5 35 10 40" stroke="#F9FDED" stroke-width="0.5" fill="none"/>

        <div class="envelope-container" id="envelope" onclick="openEnvelope()">
            <div class="envelope-card" id="envelopeCard">
                <div class="card-inner-border"></div>
                <div class="card-preview-content">
                    <div class="card-preview-names">Seif</div>
                    <div class="card-preview-ampersand">&</div>
                    <div class="card-preview-names">Malak</div>

                </div>

        <div class="click-hint">Click to Open</div>

    <div class="transition-overlay" id="transitionOverlay"></div>

    <!-- ===== MAIN INVITATION ===== -->
    <div class="main-invitation" id="mainInvitation">
        <div class="invitation-card">
            <div class="lace-border"></div>

            <div class="card-floral top-left">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M10 50 Q10 10 50 10" stroke="#721A1A" stroke-width="1" fill="none"/>

                    <circle cx="25" cy="25" r="5" stroke="#721A1A" stroke-width="0.6" fill="none"/>

            <div class="card-content">
                <div class="youre-invited">You're invited</div>

                <div class="ring-box-svg">

                        <g opacity="0.6">

    <script>
        let isOpened = false;
        function openEnvelope() {
            if (isOpened) return;
            isOpened = true;
            const envelope = document.getElementById('envelope');
            const envelopeScreen = document.getElementById('envelopeScreen');
            const transitionOverlay = document.getElementById('transitionOverlay');
            const mainInvitation = document.getElementById('mainInvitation');
            envelope.classList.add('opened');
            setTimeout(() => { transitionOverlay.classList.add('active'); }, 1800);
            setTimeout(() => { envelopeScreen.classList.add('hidden'); mainInvitation.classList.add('visible'); }, 2200);
            setTimeout(() => { transitionOverlay.classList.remove('active'); }, 2800);
        }
    </script>
